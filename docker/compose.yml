services:
  greenmail:
    image: greenmail/standalone:2.1.10
    environment:
      GREENMAIL_OPTS: '-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users=tester:testpass@localhost -Dgreenmail.verbose'
    healthcheck:
      # image has no wget/curl; bash + /dev/tcp confirms the smtp port is accepting
      test: ['CMD-SHELL', 'bash -c ": < /dev/tcp/127.0.0.1/3025" || exit 1']
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 30s
    ports:
      - '127.0.0.1:3025:3025' # smtp
      - '127.0.0.1:3143:3143' # imap
      - '127.0.0.1:3110:3110' # pop3
      - '127.0.0.1:8080:8080' # rest api (readiness)
