name: End-to-End & Integration

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Cache Playwright Browsers
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install Playwright Browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium webkit
      - name: Install Playwright System Deps (cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium webkit
      - name: Prepare Nuxt
        run: bunx nuxi prepare
      - name: Run Playwright Tests with Coverage
        run: bun run test:e2e:coverage
        env:
          CI: '1'
      - name: Run Setup Lane
        run: bun run test:e2e:setup
        env:
          CI: '1'
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            coverage/
          retention-days: 14
      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: e2e
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Cache Docker Images
        if: ${{ !cancelled() }}
        uses: actions/cache@v6
        with:
          path: /tmp/docker-images
          key: docker-${{ runner.os }}-${{ hashFiles('docker/**') }}
      - name: Load or Pull Docker Images
        run: |
          if [ -f /tmp/docker-images/images.tar ]; then
            docker load -i /tmp/docker-images/images.tar
          else
            docker compose -f docker/compose.yml pull
            mkdir -p /tmp/docker-images
            docker compose -f docker/compose.yml config --images | sort -u | xargs docker save -o /tmp/docker-images/images.tar
          fi
      - name: Boot Integration Servers
        run: docker compose -f docker/compose.yml up -d --wait
      - name: Tune TCP for High Localhost Connection Churn
        run: |
          sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1
          sudo sysctl -w net.ipv4.tcp_fin_timeout=15
      - name: Run Integration Tests
        uses: nick-fields/retry@v4
        env:
          INTEGRATION: '1'
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: bun run test:integration
      - name: Upload Coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: integration
          fail_ci_if_error: false
      - name: Dump Server Logs on Failure
        if: ${{ failure() }}
        run: docker compose -f docker/compose.yml logs --no-color
      - name: Teardown Servers
        if: ${{ always() }}
        run: docker compose -f docker/compose.yml down -v
