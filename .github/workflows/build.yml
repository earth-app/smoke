name: Build and Test

on:
  push:
    branches: [master, ver/*]
  pull_request:
    branches: [master, ver/*]

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Prettier
        run: bun run prettier:check

  test:
    runs-on: ubuntu-latest
    needs: [format]
    timeout-minutes: 120

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Tests
        run: bun run test:report
      - name: Archive Test Output
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: test-report.junit.xml
      - name: Upload to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: earth-app/smoke
          report_type: test_results
          fail_ci_if_error: true
          flags: unittests
          files: |
            test-report.junit.xml

  coverage:
    runs-on: ubuntu-latest
    needs: [format]
    timeout-minutes: 120

    permissions:
      contents: read
      packages: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Tests with Coverage
        run: bun run test:coverage
      - name: Archive Test Coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
      - name: Code Coverage Summary Report
        uses: saschanowak/CloverCodeCoverageSummary@1.1.1
        with:
          filename: coverage/clover.xml
      - name: Add Coverage to Job Summary
        run: |
          cat code-coverage-summary.md >> $GITHUB_STEP_SUMMARY
          cat code-coverage-details.md >> $GITHUB_STEP_SUMMARY
      - name: Upload to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: earth-app/smoke
          fail_ci_if_error: true
          flags: unittests
          files: |
            coverage/lcov.info

  build:
    runs-on: ubuntu-latest
    needs: [test, format]
    timeout-minutes: 60

    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Project
        run: bun run build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Archive Build Artifacts
        id: archive
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts-${{ github.run_id }}
          path: .output/
          overwrite: true
          include-hidden-files: true
      - name: Attest Build Artifacts
        if: success() || failure()
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: smoke-build-${{ github.run_id }}
          subject-digest: sha256:${{ steps.archive.outputs.artifact-digest }}
