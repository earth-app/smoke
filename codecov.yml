coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 60%
        threshold: 5%

comment:
  layout: 'condensed_header, condensed_files, condensed_footer'
  require_changes: true

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    # names must match the flags the workflows upload under; a mismatch leaves the real
    # flags on the default rules with no src/ scope (build.yml: unittests, e2e.yml: e2e + integration)
    - name: unittests
      paths:
        - src/
    - name: e2e
      paths:
        - src/
    - name: integration
      paths:
        - src/

ignore:
  - 'tests/**/*'
  - 'coverage/**/*'
  - '**/*.test.ts'
  - '**/*.spec.ts'
  - 'vitest.config.ts'
  - 'wrangler.jsonc'
  - 'wrangler.test.jsonc'
  - 'dist/**/*'
